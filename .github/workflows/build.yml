name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.3.0)'
        required: false

permissions:
  contents: read

env:
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
  KEYGEN_ACCOUNT_ID: bb57e8aa-625f-42d2-b5b2-b308796e872e
  KEYGEN_PRODUCT_ID: 4138ca3d-6125-4cbf-954f-7c921f34fc78

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            ffmpeg
      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Build frontend
        run: npm run build
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src-tauri/target/debug/*.log
          if-no-files-found: ignore

  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_release: ${{ steps.version.outputs.IS_RELEASE }}
    steps:
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=ci-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          fi

  # ────────────────────────────────────────────────────────
  # Ubuntu (.deb + .AppImage)
  # ────────────────────────────────────────────────────────
  build-ubuntu:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────
  # Windows (.msi + .exe)
  # ────────────────────────────────────────────────────────
  build-windows:
    needs: get-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────
  # macOS (.dmg)
  # ────────────────────────────────────────────────────────
  build-macos:
    needs: get-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────
  # Fedora (.rpm)
  # ────────────────────────────────────────────────────────
  build-fedora:
    needs: get-version
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          dnf install -y gcc-c++ make glib2-devel \
            webkit2gtk4.1-devel libxdo-devel openssl-devel \
            libappindicator-gtk3-devel librsvg2-devel \
            file wget curl which perl

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Node.js
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf install -y nodejs

      - name: Install npm dependencies
        run: npm ci

      - name: Build (RPM only)
        run: npm run tauri build -- --bundles rpm
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────
  # Publish to GitHub Releases
  # ────────────────────────────────────────────────────────
  publish-github:
    needs: [get-version, build-ubuntu, build-windows, build-macos, build-fedora]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true

      - name: Collect artifacts
        run: find . -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.tar.gz' -o -name '*.tgz' -o -name '*.zip' -o -name '*.sig' \) -exec mv -t . {} +

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: Postilla v${{ needs.get-version.outputs.version }}
          files: |
            *.deb
            *.rpm
            *.AppImage
            *.msi
            *.exe
            *.dmg
            *.tar.gz
            *.tgz
            *.zip
            *.sig
          fail_on_unmatched_files: false
          generate_release_notes: true

  # ────────────────────────────────────────────────────────
  # Publish to Keygen.sh Releases (solo per release)
  # ────────────────────────────────────────────────────────
  publish-keygen:
    if: needs.get-version.outputs.is_release == 'true'
    needs: [get-version, build-ubuntu, build-windows, build-macos, build-fedora]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true

      - name: Collect artifacts
        run: find . -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.tar.gz' -o -name '*.tgz' -o -name '*.zip' -o -name '*.sig' \) -exec mv -t . {} +

      - name: List all artifacts
        run: ls -lhR

      - name: Create release on Keygen.sh
        id: create_release
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          ACCOUNT="${{ env.KEYGEN_ACCOUNT_ID }}"
          PRODUCT="${{ env.KEYGEN_PRODUCT_ID }}"
          TOKEN="${{ secrets.KEYGEN_API_TOKEN }}"

          EXISTING=$(curl -s "https://api.keygen.sh/v1/accounts/$ACCOUNT/releases?product=$PRODUCT&version=$VERSION" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.api+json")

          RELEASE_ID=$(echo "$EXISTING" | jq -r --arg ver "$VERSION" \
            '.data[] | select(.attributes.version == $ver) | .id' 2>/dev/null || echo "")

          if [ -n "$RELEASE_ID" ]; then
            echo "Release v$VERSION already exists (ID: $RELEASE_ID)"
            echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_OUTPUT
          else
            echo "Creating release v$VERSION..."
            JSON=$(jq -n --arg ver "$VERSION" --arg pid "$PRODUCT" \
              '{data: {type: "releases", attributes: {version: $ver, name: "Postilla v\($ver)", tag: "v\($ver)", channel: "tauri"}, relationships: {product: {data: {type: "products", id: $pid}}}}}')
            RESP=$(curl -s -X POST "https://api.keygen.sh/v1/accounts/$ACCOUNT/releases" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/vnd.api+json" \
              -H "Accept: application/vnd.api+json" \
              -d "$JSON")

            RELEASE_ID=$(echo "$RESP" | jq -r '.data.id' 2>/dev/null || echo "")

            echo "Created release ID: $RELEASE_ID"
            echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts to Keygen
        if: steps.create_release.outputs.RELEASE_ID != ''
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          ACCOUNT="${{ env.KEYGEN_ACCOUNT_ID }}"
          TOKEN="${{ secrets.KEYGEN_API_TOKEN }}"
          RELEASE_ID="${{ steps.create_release.outputs.RELEASE_ID }}"

          upload_artifact() {
            local FILE="$1"
            local PLATFORM="$2"
            local ARCH="$3"
            echo "Uploading: $FILE → platform=$PLATFORM arch=$ARCH"
            curl -s -X POST "https://api.keygen.sh/v1/accounts/$ACCOUNT/releases/$RELEASE_ID/artifacts" \
              -H "Authorization: Bearer $TOKEN" \
              -F "artifact[platform]=$PLATFORM" \
              -F "artifact[arch]=$ARCH" \
              -F "artifact[file]=@$FILE"
            echo ""
          }

          for f in *.deb; do [ -f "$f" ] && upload_artifact "$f" "linux-deb" "amd64"; done
          for f in *.rpm; do [ -f "$f" ] && upload_artifact "$f" "linux-rpm" "amd64"; done
          for f in *.AppImage; do [ -f "$f" ] && upload_artifact "$f" "linux-appimage" "amd64"; done
          for f in *.msi; do [ -f "$f" ] && upload_artifact "$f" "windows-msi" "x86_64"; done
          for f in *.exe; do [ -f "$f" ] && upload_artifact "$f" "windows-exe" "x86_64"; done
          for f in *.dmg; do [ -f "$f" ] && upload_artifact "$f" "macos-dmg" "aarch64"; done
          for f in *.tar.gz *.tgz; do [ -f "$f" ] && upload_artifact "$f" "updater" "amd64"; done
          for f in *.zip; do [ -f "$f" ] && upload_artifact "$f" "updater" "x86_64"; done
          for f in *.sig; do [ -f "$f" ] && upload_artifact "$f" "signature" "amd64"; done

      - name: Summary
        run: |
          echo "Release v${{ needs.get-version.outputs.version }} published on Keygen.sh"
          echo ""
          echo "Artifacts uploaded:"
          ls -lh
